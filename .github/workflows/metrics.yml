name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/metrics.yml"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jcardonne
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Paris
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          # --- Music plugin (Last.fm) ---
          # To enable:
          #   1. Create API key: https://www.last.fm/api/account/create
          #   2. gh secret set LASTFM_API_KEY -R jcardonne/jcardonne
          #   3. Uncomment below and set your Last.fm username
          # plugin_music: yes
          # plugin_music_provider: lastfm
          # plugin_music_mode: recent
          # plugin_music_user: YOUR_LASTFM_USERNAME
          # plugin_music_token: ${{ secrets.LASTFM_API_KEY }}
          # plugin_music_limit: 4
