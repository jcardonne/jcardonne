<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" width="100%" role="img" aria-label="Jean Cardonne - Developer and Music Producer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>
    <clipPath id="frame">
      <rect width="1280" height="280"/>
    </clipPath>
  </defs>
  <style>
    .name {
      font: 700 58px 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif;
      fill: #ffffff;
      opacity: 0;
      animation: fadeUp 0.9s ease-out 0.1s forwards;
    }
    .sub {
      font: 400 21px 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif;
      fill: #b8b8d0;
      letter-spacing: 5px;
      opacity: 0;
      animation: fadeUp 0.9s ease-out 0.5s forwards;
    }
    .bar {
      opacity: 0;
      animation: fadeUp 0.9s ease-out 0.3s forwards;
    }
    .wave1 { animation: drift 9s ease-in-out infinite alternate; }
    .wave2 { animation: drift 13s ease-in-out infinite alternate-reverse; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes drift {
      from { transform: translateX(0); }
      to   { transform: translateX(-60px); }
    }
  </style>
  <rect width="1280" height="280" fill="url(#bg)"/>
  <g clip-path="url(#frame)">
    <path class="wave1" fill="#ffffff" opacity="0.05"
      d="M0,206 C120,186 240,226 360,206 C480,186 600,226 720,206 C840,186 960,226 1080,206 C1200,186 1320,226 1440,206 L1440,280 L0,280 Z"/>
    <path class="wave2" fill="#ffffff" opacity="0.08"
      d="M0,232 C140,212 280,252 420,232 C560,212 700,252 840,232 C980,212 1120,252 1260,232 C1330,222 1400,242 1460,232 L1460,280 L0,280 Z"/>
  </g>
  <text x="640" y="128" text-anchor="middle" class="name">Jean Cardonne</text>
  <rect class="bar" x="565" y="148" width="150" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="640" y="186" text-anchor="middle" class="sub">DEVELOPER &amp; MUSIC PRODUCER</text>
</svg>
